<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VectorMind Helper</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; width: 280px; margin: 0; padding: 12px; }
      button { width: 100%; padding: 10px 12px; border: 0; border-radius: 10px; background: #4f46e5; color: white; font-weight: 600; cursor: pointer; }
      button:disabled { opacity: 0.6; cursor: not-allowed; }
      .hint { margin-top: 10px; font-size: 12px; color: #666; line-height: 1.4; }
      .log { margin-top: 10px; font-size: 12px; white-space: pre-wrap; background: #f6f6f6; padding: 8px; border-radius: 8px; }
    </style>
  </head>
  <body>
    <button id="btn">采集当前页面指标</button>
    <div class="hint">
      需要本机小助手运行在 127.0.0.1:18765，并且浏览器已登录小红书/抖音。
    </div>
    <div id="log" class="log" style="display:none"></div>
    <script src="popup.js"></script>
  </body>
</html>
