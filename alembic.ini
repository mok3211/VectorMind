[alembic]
script_location = alembic
prepend_sys_path = .

# 注意：优先从项目根目录 .env 的 DATABASE_URL 读取（见 alembic/env.py）
# 仅当未配置 DATABASE_URL 时才会使用该兜底值。
sqlalchemy.url = sqlite+aiosqlite:///./dev.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
